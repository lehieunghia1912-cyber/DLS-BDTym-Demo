<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZaloPay BD Agent</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .app {
      width: 100%;
      max-width: 780px;
      height: 100vh;
      max-height: 700px;
      display: flex;
      flex-direction: column;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      overflow: hidden;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      background: #0068FF;
      color: #fff;
      flex-shrink: 0;
    }
    .header-avatar {
      width: 42px; height: 42px;
      border-radius: 50%;
      background: rgba(255,255,255,0.25);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 600; color: #fff;
      flex-shrink: 0;
    }
    .header-info { flex: 1; }
    .header-name { font-size: 15px; font-weight: 600; }
    .header-role { font-size: 12px; opacity: 0.85; margin-top: 1px; }
    .header-status {
      display: flex; align-items: center; gap: 5px;
      font-size: 12px; opacity: 0.9;
    }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%; background: #4cfa8c;
    }
    .new-chat-btn {
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.35);
      color: #fff;
      font-size: 12px;
      padding: 6px 12px;
      border-radius: 20px;
      cursor: pointer;
      display: flex; align-items: center; gap: 5px;
      transition: background 0.15s;
    }
    .new-chat-btn:hover { background: rgba(255,255,255,0.28); }

    /* Error bar */
    #error-bar {
      display: none;
      padding: 8px 16px;
      background: #fff0f0;
      color: #c0392b;
      font-size: 13px;
      border-bottom: 1px solid #fcc;
    }

    /* Messages */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 20px 12px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }

    .date-divider {
      text-align: center;
      font-size: 11px;
      color: #aaa;
      margin: 4px 0;
    }

    .msg-row { display: flex; align-items: flex-end; gap: 8px; }
    .msg-row.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 600;
      flex-shrink: 0;
    }
    .msg-avatar.agent { background: #e3eeff; color: #0068FF; }
    .msg-avatar.user  { background: #e8e8e8; color: #555; }

    .bubble {
      max-width: 68%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .bubble.agent {
      background: #f1f3f5;
      color: #1a1a2e;
      border-bottom-left-radius: 4px;
    }
    .bubble.user {
      background: #0068FF;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .bubble.typing {
      background: #f1f3f5;
      color: #999;
      font-style: italic;
      font-size: 13px;
      border-bottom-left-radius: 4px;
    }

    .msg-meta {
      font-size: 11px;
      color: #bbb;
      margin-top: 3px;
      padding: 0 4px;
    }
    .msg-row.user .msg-meta { text-align: right; }

    /* Footer */
    .footer {
      padding: 12px 16px;
      border-top: 1px solid #eee;
      background: #fafafa;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }
    #chat-input {
      flex: 1;
      padding: 10px 14px;
      font-size: 14px;
      border: 1px solid #ddd;
      border-radius: 22px;
      outline: none;
      resize: none;
      line-height: 1.5;
      max-height: 120px;
      overflow-y: auto;
      font-family: inherit;
      transition: border-color 0.15s;
    }
    #chat-input:focus { border-color: #0068FF; }
    #send-btn {
      width: 42px; height: 42px; border-radius: 50%;
      background: #0068FF;
      border: none;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, transform 0.1s;
      flex-shrink: 0;
    }
    #send-btn:hover { background: #0054cc; }
    #send-btn:active { transform: scale(0.93); }
    #send-btn:disabled { background: #b0c8ff; cursor: not-allowed; transform: none; }

    /* Scrollbar */
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }

    /* Suggested prompts */
    .suggestions {
      display: flex; flex-wrap: wrap; gap: 8px;
      padding: 0 20px 12px;
    }
    .suggestion-chip {
      padding: 6px 13px;
      font-size: 12px;
      border: 1px solid #0068FF;
      border-radius: 20px;
      color: #0068FF;
      cursor: pointer;
      background: #fff;
      transition: background 0.12s;
    }
    .suggestion-chip:hover { background: #e8f0ff; }

    @media (max-width: 600px) {
      .app { max-height: 100vh; border-radius: 0; }
      .bubble { max-width: 82%; }
    }
  </style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="header-avatar">MT</div>
    <div class="header-info">
      <div class="header-name">Minh Tuấn — ZaloPay BD</div>
      <div class="header-role">Chuyên viên Phát triển Kinh doanh</div>
    </div>
    <div class="header-status">
      <span class="status-dot"></span>
      <span>Online</span>
    </div>
    <button class="new-chat-btn" id="new-chat-btn">
      &#8635; Hội thoại mới
    </button>
  </div>

  <div id="error-bar"></div>

  <div id="messages">
    <div class="date-divider">Hôm nay</div>
    <div class="msg-row" id="welcome-msg">
      <div class="msg-avatar agent">MT</div>
      <div>
        <div class="bubble agent">Xin chào! Tôi là Minh Tuấn từ đội BD ZaloPay 👋<br>Anh/chị đang kinh doanh trong lĩnh vực nào và cần tư vấn giải pháp thanh toán gì ạ?</div>
        <div class="msg-meta" id="welcome-time"></div>
      </div>
    </div>
  </div>

  <div class="suggestions" id="suggestions">
    <button class="suggestion-chip">Tích hợp QR thanh toán</button>
    <button class="suggestion-chip">Phí cổng thanh toán</button>
    <button class="suggestion-chip">BNPL mua trước trả sau</button>
    <button class="suggestion-chip">Quy trình onboarding</button>
  </div>

  <div class="footer">
    <textarea id="chat-input" rows="1" placeholder="Nhập tin nhắn..."></textarea>
    <button id="send-btn" title="Gửi">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
</div>

<script>
  const PROXY = 'https://endpoint-5ba1b661-e5a5-4ee2-89ea-fa828afbd711.agentbase-runtime.aiplatform.vngcloud.vn/chat';
  let sessionId = newSessionId();
  let isWaiting = false;

  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('chat-input');
  const sendBtn    = document.getElementById('send-btn');
  const errorBar   = document.getElementById('error-bar');
  const suggestEl  = document.getElementById('suggestions');

  document.getElementById('welcome-time').textContent = now();

  function newSessionId() {
    return 'session-' + Math.random().toString(36).slice(2, 9);
  }

  function now() {
    return new Date().toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
  }

  function showError(msg) {
    errorBar.textContent = msg;
    errorBar.style.display = 'block';
    setTimeout(() => { errorBar.style.display = 'none'; }, 7000);
  }

  function appendMsg(text, role, extraClass) {
    const cls = extraClass || role;
    const row = document.createElement('div');
    row.className = 'msg-row' + (role === 'user' ? ' user' : '');

    const av = document.createElement('div');
    av.className = 'msg-avatar ' + role;
    av.textContent = role === 'user' ? 'Bạn' : 'MT';

    const col = document.createElement('div');
    const bub = document.createElement('div');
    bub.className = 'bubble ' + cls;
    bub.textContent = text;

    const meta = document.createElement('div');
    meta.className = 'msg-meta';
    meta.textContent = now();

    col.appendChild(bub);
    if (role !== 'typing') col.appendChild(meta);

    if (role === 'user') { row.appendChild(col); row.appendChild(av); }
    else                 { row.appendChild(av);  row.appendChild(col); }

    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return { row, bub };
  }

  async function sendMessage(text) {
    text = text.trim();
    if (!text || isWaiting) return;

    suggestEl.style.display = 'none';
    isWaiting = true;
    sendBtn.disabled = true;
    inputEl.value = '';
    inputEl.style.height = 'auto';

    appendMsg(text, 'user');
    const { row: typingRow } = appendMsg('Đang xử lý...', 'typing', 'typing');

    try {
      const res = await fetch(PROXY, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, session_id: sessionId })
      });
      const data = await res.json();
      typingRow.remove();
      if (res.ok) {
        appendMsg(data.reply, 'agent');
      } else {
        showError('Lỗi ' + res.status + ': ' + (data.error || 'Agent trả về lỗi.'));
      }
    } catch (e) {
      typingRow.remove();
      showError('Không thể kết nối tới agent: ' + e.message);
    } finally {
      isWaiting = false;
      sendBtn.disabled = false;
      inputEl.focus();
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }
  }

  sendBtn.addEventListener('click', () => sendMessage(inputEl.value));

  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(inputEl.value); }
  });

  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });

  suggestEl.querySelectorAll('.suggestion-chip').forEach(chip => {
    chip.addEventListener('click', () => sendMessage(chip.textContent));
  });

  document.getElementById('new-chat-btn').addEventListener('click', () => {
    sessionId = newSessionId();
    messagesEl.innerHTML = '';
    const div = document.createElement('div');
    div.className = 'date-divider';
    div.textContent = 'Hội thoại mới';
    messagesEl.appendChild(div);
    appendMsg('Xin chào! Tôi là Minh Tuấn từ đội BD ZaloPay 👋\nAnh/chị đang kinh doanh trong lĩnh vực nào và cần tư vấn giải pháp thanh toán gì ạ?', 'agent');
    suggestEl.style.display = 'flex';
    errorBar.style.display = 'none';
    inputEl.focus();
  });
</script>
</body>
</html>
